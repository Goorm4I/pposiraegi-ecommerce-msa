server:
  port: 8080

spring:
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: "http://localhost:3000"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                exposedHeaders:
                  - Authorization
                allowCredentials: true
          routes:
            - id: user-service-public
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/auth/login, /api/v1/users/register

            - id: user-service-private
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/users/**
              filters:
                - JwtAuthFilter

            - id: order-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/v1/orders, /api/v1/orders/**
              filters:
                - JwtAuthFilter

            - id: product-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/products/**

logging:
  level:
    cloud.pposiraegi.user: DEBUG
    org.springframework.web: DEBUG