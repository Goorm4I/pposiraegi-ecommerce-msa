spring:
  application:
    name: "product-service"
  profiles:
    active: local
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ecommerce}
    username: ${SPRING_DATASOURCE_USERNAME:user}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        default_batch_fetch_size: 100
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 16379
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 64
          max-idle: 8
          min-idle: 2
          max-wait: 1000ms
  threads:
    virtual:
      enabled: true
  task:
    scheduling:
      pool:
        size: 5
      thread-name-prefix: scheduler-

storage:
  location: C:/tmp/pposiraegi/uploads/images

cors:
  allowed-origins:
    - "http://localhost:3000"
    - "https://pposiraegi.cloud"