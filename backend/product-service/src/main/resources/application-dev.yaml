server:
  port: ${SERVER_PORT:80}

spring:

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

    # 스프링 부트 4.0 성능 최적화: 가상 스레드 활성화
  threads:
    virtual:
      enabled: true

logging:
  level:
    cloud.pposiraegi.product: DEBUG
    org.springframework.web: DEBUG

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

storage:
  location: /app/uploads/