# 민감하지 않은 공통 환경변수
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: pposiraegi
data:
  SPRING_PROFILES_ACTIVE: "prod"
  DB_HOST: "pposiraegi-db.c5wkmcaauwn2.ap-northeast-2.rds.amazonaws.com"
  DB_USERNAME: "pposiraegi"
  # REDIS_HOST는 각 서비스 deployment에서 개별 설정
  USER_SERVICE_URL: "http://user-service.pposiraegi.svc.cluster.local:8080"
  PRODUCT_SERVICE_URL: "http://product-service.pposiraegi.svc.cluster.local:8080"
  ORDER_SERVICE_URL: "http://order-service.pposiraegi.svc.cluster.local:8080"
  USER_GRPC_URL: "static://user-service.pposiraegi.svc.cluster.local:9090"
  PRODUCT_GRPC_URL: "static://product-service.pposiraegi.svc.cluster.local:9090"
