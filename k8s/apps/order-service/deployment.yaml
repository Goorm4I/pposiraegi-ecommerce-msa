apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: pposiraegi
  labels:
    app: order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      serviceAccountName: order-service

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: order-service
                topologyKey: kubernetes.io/hostname

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: order-service

      containers:
        - name: order-service
          image: 779846782353.dkr.ecr.ap-northeast-2.amazonaws.com/pposiraegi-order-service:latest
          ports:
            - name: http
              containerPort: 8080

          envFrom:
            - configMapRef:
                name: app-config

          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: db-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: jwt-secret
            - name: REDIS_HOST
              value: "pposiraegi-redis.REPLACE_ME.cfg.apn2.cache.amazonaws.com"
            # EKS 환경에서 PG 콜백 URL (도메인은 동일하게 유지)
            - name: PG_SUCCESS_URL
              value: "https://pposiraegi.cloud/api/v1/orders/success"
            - name: PG_FAIL_URL
              value: "https://pposiraegi.cloud/api/v1/orders/fail"

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"

          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            failureThreshold: 30
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            periodSeconds: 10
            failureThreshold: 3

          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]

      terminationGracePeriodSeconds: 60
