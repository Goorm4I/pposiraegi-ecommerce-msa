apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: pposiraegi
  labels:
    app: api-gateway
    version: "latest"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      serviceAccountName: api-gateway  # IRSA

      # 같은 노드에 몰리지 않게
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: api-gateway
                topologyKey: kubernetes.io/hostname

      # 멀티 AZ 분산
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: api-gateway

      containers:
        - name: api-gateway
          # 실제 ECR URL은 Argo CD Image Updater 또는 CI에서 주입
          image: 779846782353.dkr.ecr.ap-northeast-2.amazonaws.com/pposiraegi-api-gateway:latest
          ports:
            - containerPort: 8080

          envFrom:
            - configMapRef:
                name: app-config

          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: jwt-secret

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"

          # Spring Boot 기동 시간 확보 (최대 5분)
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            failureThreshold: 30
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3

          # Karpenter consolidation 시 502 방지
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]

      terminationGracePeriodSeconds: 60
