name: Backend MSA CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'

env:
  AWS_REGION: ap-northeast-2 # 리전에 맞게 수정 필요
  ECS_CLUSTER: pposiraegi-cluster

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Paths Filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api-gateway:
              - 'backend/api-gateway/**'
              - 'backend/common/**'
              - 'backend/grpc-interface/**'
              - 'backend/build.gradle'
              - 'backend/Dockerfile'
            user-service:
              - 'backend/user-service/**'
              - 'backend/common/**'
              - 'backend/grpc-interface/**'
              - 'backend/build.gradle'
              - 'backend/Dockerfile'
            product-service:
              - 'backend/product-service/**'
              - 'backend/common/**'
              - 'backend/grpc-interface/**'
              - 'backend/build.gradle'
              - 'backend/Dockerfile'
            order-service:
              - 'backend/order-service/**'
              - 'backend/common/**'
              - 'backend/grpc-interface/**'
              - 'backend/build.gradle'
              - 'backend/Dockerfile'

  build-and-deploy:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: pposiraegi-${{ matrix.service }}
          IMAGE_TAG: ${{ github.sha }}
        working-directory: ./backend
        run: |
          docker build --build-arg MODULE_NAME=${{ matrix.service }} -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Force ECS deployment
        run: |
          aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service pposiraegi-${{ matrix.service }}-service --force-new-deployment
