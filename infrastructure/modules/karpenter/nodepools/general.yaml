# On-demand 노드풀 (안정적인 워크로드용)
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: general
spec:
  template:
    metadata:
      labels:
        role: app
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default

      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - t3.medium
            - t3.large
            - t3a.medium
            - t3a.large
        - key: topology.kubernetes.io/zone
          operator: In
          values:
            - ap-northeast-2a
            - ap-northeast-2b

      # 노드당 최대 Pod 수 제한
      kubelet:
        maxPods: 58

  # 비용 최적화: 노드가 비면 자동 제거
  disruption:
    consolidationPolicy: WhenUnderutilized
    consolidateAfter: 30s

  # 클러스터 전체 상한 (폭주 방지)
  limits:
    cpu: 20
    memory: 40Gi

---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  # AMI는 EKS 최적화 Amazon Linux 2 자동 선택
  amiFamily: AL2
  role: REPLACE_ME_NODE_ROLE_NAME   # terraform output에서 채울 것

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: REPLACE_ME_CLUSTER_NAME

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: REPLACE_ME_CLUSTER_NAME

  # 루트 볼륨 설정
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 30Gi
        volumeType: gp3
        encrypted: true

  tags:
    Name: REPLACE_ME_CLUSTER_NAME-karpenter-node
    Project: pposiraegi
